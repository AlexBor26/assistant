name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout кода
        uses: actions/checkout@v4

      - name: 🐍 Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install flet>=0.25.0 pillow openai

      - name: 🤖 Настройка Android SDK
        uses: android-actions/setup-android@v3

      - name: 🛠 Установка SDK, Build Tools и NDK
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653" "cmdline-tools;latest"
          yes | sdkmanager --licenses || true

      - name: ⚡ Кэширование Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🏗 Сборка APK через Flet
        run: flet build apk --yes
        env:
          CI: "true"

      - name: 📦 Загрузка артефакта
        uses: actions/upload-artifact@v4
        with:
          name: fishing-bait-app-${{ github.run_number }}
          path: build/apk/*.apk
          if-no-files-found: warn
          retention-days: 30
