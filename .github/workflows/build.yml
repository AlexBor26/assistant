name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install flet
          pip install requests
          pip install pillow
      
      - name: Build APK
        run: |
          echo "y" | flet build apk --add-package requests --add-package pillow
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: assistant-apk
          path: build/apk/*.apk
